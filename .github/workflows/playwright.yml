# .github/workflows/playwright.yml
# ═══════════════════════════════════════════════════════════════════════════════
# FILE LOCATION: .github/workflows/playwright.yml
#
# GitHub Actions CI pipeline — mirrors the Jenkinsfile logic.
# Credentials come from GitHub Secrets (Settings → Secrets → Actions).
#
# ADD THESE SECRETS IN GITHUB UI:
#   SUPERADMIN_USER, SUPERADMIN_PASS
#   CLIENTADMIN_USER, CLIENTADMIN_PASS
#   ESS_USER, ESS_PASS
#   EXPECTED_ENV_URL
# ═══════════════════════════════════════════════════════════════════════════════

name: Playwright BDD Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:   # manual trigger from GitHub UI

jobs:

  # ── Job 1: Smoke Tests (fast-fail gate) ──────────────────────────────────────
  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - run: npx bddgen
      - name: Run smoke tests
        run: npx playwright test --project=smoke
        env:
          CI: true
          ENV:              dev
          SUPERADMIN_USER:  ${{ secrets.SUPERADMIN_USER }}
          SUPERADMIN_PASS:  ${{ secrets.SUPERADMIN_PASS }}
          CLIENTADMIN_USER: ${{ secrets.CLIENTADMIN_USER }}
          CLIENTADMIN_PASS: ${{ secrets.CLIENTADMIN_PASS }}
          ESS_USER:         ${{ secrets.ESS_USER }}
          ESS_PASS:         ${{ secrets.ESS_PASS }}
          EXPECTED_ENV_URL: ${{ secrets.EXPECTED_ENV_URL }}
          # AZURE_VAULT_URL: ${{ secrets.AZURE_VAULT_URL }}

  # ── Job 2: Regression with sharding (only if smoke passes) ───────────────────
  regression:
    name: Regression Shard ${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
    needs: smoke            # waits for smoke job — only runs if smoke passes
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false      # all shards run even if one fails (collect full results)
      matrix:
        shardIndex: [1, 2, 3]
        shardTotal: [3]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - run: npx bddgen
      - name: Run regression shard ${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
        run: npx playwright test --project=regression --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
        env:
          CI: true
          ENV:              dev
          SUPERADMIN_USER:  ${{ secrets.SUPERADMIN_USER }}
          SUPERADMIN_PASS:  ${{ secrets.SUPERADMIN_PASS }}
          CLIENTADMIN_USER: ${{ secrets.CLIENTADMIN_USER }}
          CLIENTADMIN_PASS: ${{ secrets.CLIENTADMIN_PASS }}
          ESS_USER:         ${{ secrets.ESS_USER }}
          ESS_PASS:         ${{ secrets.ESS_PASS }}
          EXPECTED_ENV_URL: ${{ secrets.EXPECTED_ENV_URL }}
      # Upload shard blob report for merging
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: blob-report-shard-${{ matrix.shardIndex }}
          path: blob-report/
          retention-days: 3

  # ── Job 3: Merge shard reports ────────────────────────────────────────────────
  merge-reports:
    name: Merge Reports
    needs: regression
    runs-on: ubuntu-latest
    if: always()    # run even if some shards failed — we want the full report
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
      - run: npm ci
      - name: Download all shard reports
        uses: actions/download-artifact@v4
        with:
          path: all-blob-reports
          pattern: blob-report-shard-*
          merge-multiple: true
      - name: Merge reports
        run: npx playwright merge-reports --reporter html ./all-blob-reports
      - uses: actions/upload-artifact@v4
        with:
          name: playwright-report-merged
          path: playwright-report/
          retention-days: 14

  # ── Job 4: Quarantine (never fails build) ─────────────────────────────────────
  quarantine:
    name: Quarantine Tests
    needs: smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true    # this job never fails the overall workflow
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - run: npx bddgen
      - name: Run quarantine tests
        run: npx playwright test --project=quarantine || true   # || true = never fail
        env:
          CI: true
          ENV:              dev
          SUPERADMIN_USER:  ${{ secrets.SUPERADMIN_USER }}
          SUPERADMIN_PASS:  ${{ secrets.SUPERADMIN_PASS }}
          CLIENTADMIN_USER: ${{ secrets.CLIENTADMIN_USER }}
          CLIENTADMIN_PASS: ${{ secrets.CLIENTADMIN_PASS }}
          ESS_USER:         ${{ secrets.ESS_USER }}
          ESS_PASS:         ${{ secrets.ESS_PASS }}
          EXPECTED_ENV_URL: ${{ secrets.EXPECTED_ENV_URL }}