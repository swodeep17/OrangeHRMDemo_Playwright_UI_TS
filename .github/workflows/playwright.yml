# .github/workflows/playwright.yml
# ═══════════════════════════════════════════════════════════════════════════════
# FILE LOCATION: .github/workflows/playwright.yml
#
# GitHub Actions CI pipeline — Docker-based execution.
#
# HOW DOCKER IS USED HERE:
#   Every job uses:  container: mcr.microsoft.com/playwright:v1.60.0-jammy
#   This means:
#     ✅ Node.js       — already in the image (no setup-node needed)
#     ✅ Chromium      — already in the image (no playwright install needed)
#     ✅ Firefox       — already in the image
#     ✅ System libs   — already in the image (libgbm, openssl etc — frozen)
#     ✅ OS            — Ubuntu 22.04 Jammy — frozen, never changes
#     ✅ npm packages  — installed fresh via npm ci (your code, not the image)
#
# WHAT EACH STEP DOES THAT npm ci REPLACES:
#   REMOVED: actions/setup-node  — Docker image already has Node 18 baked in
#   REMOVED: npx playwright install chromium --with-deps — browsers in image
#   KEPT:    npm ci              — installs YOUR project's node_modules
#   KEPT:    npx bddgen          — generates spec files from .feature files
#   KEPT:    npx playwright test — runs your tests
#
# CREDENTIALS — Add these in GitHub: Settings → Secrets → Actions:
#   SUPERADMIN_USER, SUPERADMIN_PASS
#   CLIENTADMIN_USER, CLIENTADMIN_PASS (add when clientadmin tests are created)
#   ESS_USER, ESS_PASS              (add when ess tests are created)
#   EXPECTED_ENV_URL                (add when env URL validation is needed)
# ═══════════════════════════════════════════════════════════════════════════════

name: Playwright BDD Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      job:
        description: 'Which job to run manually'
        default: 'smoke'
        type: choice
        options: [smoke, regression]

jobs:

  # ── Job 1: Smoke Tests ────────────────────────────────────────────────────────
  # Runs on: every push, every PR, and every manual trigger
  # Docker: mcr.microsoft.com/playwright:v1.60.0-jammy
  #   → Node + Chromium + all system deps are pre-installed in this image
  #   → Identical environment to your Dockerfile locally
  # ─────────────────────────────────────────────────────────────────────────────
  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest       # the HOST machine — just runs the Docker container
    timeout-minutes: 15
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-jammy
      # ↑ DOCKER INTEGRATION — this single line replaces:
      #   - actions/setup-node  (Node is in the image)
      #   - npx playwright install chromium --with-deps  (Chromium is in the image)
      # Every step below now runs INSIDE this container, not on the bare runner

    steps:
      - uses: actions/checkout@v4.2.2

      # ── REMOVED: actions/setup-node — Node is already in the Docker image ────
      # - uses: actions/setup-node@v4.4.0
      #   with:
      #     node-version: 22
      #     cache: npm
      # ─────────────────────────────────────────────────────────────────────────

      - run: npm ci              # installs your project node_modules — still needed

      # ── REMOVED: playwright install — browsers are already in the Docker image ─
      # - run: npx playwright install chromium --with-deps
      # ─────────────────────────────────────────────────────────────────────────

      - run: npx bddgen          # generates .features-gen/*.spec.js from .feature files

      - name: Run smoke tests
        run: npx playwright test --project=smoke
        env:
          CI: true
          ENV:              dev
          SUPERADMIN_USER:  ${{ secrets.SUPERADMIN_USER }}
          SUPERADMIN_PASS:  ${{ secrets.SUPERADMIN_PASS }}
          CLIENTADMIN_USER: ${{ secrets.CLIENTADMIN_USER }}
          CLIENTADMIN_PASS: ${{ secrets.CLIENTADMIN_PASS }}
          ESS_USER:         ${{ secrets.ESS_USER }}
          ESS_PASS:         ${{ secrets.ESS_PASS }}
          EXPECTED_ENV_URL: ${{ secrets.EXPECTED_ENV_URL }}

      # ── Report — always uploads even when tests fail ──────────────────────────
      - uses: actions/upload-artifact@v4.6.2
        if: always()
        with:
          name: smoke-report-${{ github.run_number }}
          path: playwright-report/
          retention-days: 14

      # ── Traces — only uploaded on failure for debugging ───────────────────────
      - uses: actions/upload-artifact@v4.6.2
        if: failure()
        with:
          name: smoke-traces-${{ github.run_number }}
          path: test-results/
          retention-days: 7

  # ── Job 2: Regression with sharding ──────────────────────────────────────────
  # CURRENTLY DISABLED — manual trigger only (workflow_dispatch with job=regression)
  # Docker: same image as smoke — guarantees identical environment across all shards
  #
  # TO ENABLE AUTOMATICALLY ON PUSH:
  #   Remove the 'if' condition on this job and on merge-reports job below
  # ─────────────────────────────────────────────────────────────────────────────
  regression:
    name: Regression Shard ${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
    needs: smoke
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'regression'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-jammy
      # ↑ DOCKER — same frozen image as smoke job
      #   All 3 shards run in identical environments — no environment drift between shards
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2, 3]
        shardTotal: [3]
    steps:
      - uses: actions/checkout@v4.2.2

      # ── REMOVED: actions/setup-node — in Docker image ────────────────────────
      # - uses: actions/setup-node@v4.4.0
      #   with:
      #     node-version: 22
      #     cache: npm
      # ─────────────────────────────────────────────────────────────────────────

      - run: npm ci

      # ── REMOVED: playwright install — in Docker image ─────────────────────────
      # - run: npx playwright install chromium --with-deps
      # - run: npx playwright install firefox --with-deps  # uncomment for multi-browser
      # ─────────────────────────────────────────────────────────────────────────

      - run: npx bddgen

      - name: Run regression shard ${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
        run: npx playwright test --project=regression-chrome --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
        env:
          CI: true
          ENV:              dev
          SUPERADMIN_USER:  ${{ secrets.SUPERADMIN_USER }}
          SUPERADMIN_PASS:  ${{ secrets.SUPERADMIN_PASS }}
          CLIENTADMIN_USER: ${{ secrets.CLIENTADMIN_USER }}
          CLIENTADMIN_PASS: ${{ secrets.CLIENTADMIN_PASS }}
          ESS_USER:         ${{ secrets.ESS_USER }}
          ESS_PASS:         ${{ secrets.ESS_PASS }}
          EXPECTED_ENV_URL: ${{ secrets.EXPECTED_ENV_URL }}

      - uses: actions/upload-artifact@v4.6.2
        if: always()
        with:
          name: blob-report-shard-${{ matrix.shardIndex }}
          path: blob-report/
          retention-days: 3

  # ── Job 3: Merge shard reports ────────────────────────────────────────────────
  # CURRENTLY DISABLED — runs only when regression runs (manual-only for now)
  # No Docker needed here — just merging JSON blob files, no browser involved
  # ─────────────────────────────────────────────────────────────────────────────
  merge-reports:
    name: Merge Reports
    needs: regression
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'regression'
    # No container here — report merging doesn't need browsers or Node version precision
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-node@v4.4.0   # ← setup-node KEPT here — no Docker for this job
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Download all shard reports
        uses: actions/download-artifact@v4.3.0
        with:
          path: all-blob-reports
          pattern: blob-report-shard-*
          merge-multiple: true
      - name: Merge reports
        run: npx playwright merge-reports --reporter html ./all-blob-reports
      - uses: actions/upload-artifact@v4.6.2
        with:
          name: playwright-report-merged-${{ github.run_number }}
          path: playwright-report/
          retention-days: 14

  # ── Job 4: Quarantine Tests ───────────────────────────────────────────────────
  # CURRENTLY DISABLED — if: false keeps it completely off
  # Docker: same image — quarantine tests run in same frozen environment
  #
  # TO ENABLE:
  #   1. Remove the 'if: false' line
  #   2. Uncomment 'needs: smoke'
  # ─────────────────────────────────────────────────────────────────────────────
  quarantine:
    name: Quarantine Tests
    # needs: smoke            # uncomment when enabling
    if: false                 # DISABLED — remove this line to enable
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true   # never fails the overall workflow
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-jammy
      # ↑ DOCKER — same frozen image
    steps:
      - uses: actions/checkout@v4.2.2

      # ── REMOVED: actions/setup-node — in Docker image ────────────────────────
      # - uses: actions/setup-node@v4.4.0
      #   with:
      #     node-version: 22
      #     cache: npm
      # ─────────────────────────────────────────────────────────────────────────

      - run: npm ci

      # ── REMOVED: playwright install — in Docker image ─────────────────────────
      # - run: npx playwright install chromium --with-deps
      # ─────────────────────────────────────────────────────────────────────────

      - run: npx bddgen
      - name: Run quarantine tests
        run: npx playwright test --project=quarantine || true
        env:
          CI: true
          ENV:              dev
          SUPERADMIN_USER:  ${{ secrets.SUPERADMIN_USER }}
          SUPERADMIN_PASS:  ${{ secrets.SUPERADMIN_PASS }}
          CLIENTADMIN_USER: ${{ secrets.CLIENTADMIN_USER }}
          CLIENTADMIN_PASS: ${{ secrets.CLIENTADMIN_PASS }}
          ESS_USER:         ${{ secrets.ESS_USER }}
          ESS_PASS:         ${{ secrets.ESS_PASS }}
          EXPECTED_ENV_URL: ${{ secrets.EXPECTED_ENV_URL }}